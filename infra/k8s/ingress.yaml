apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ticketing-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: ticketing.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client-gateway-srv
                port:
                  number: 3000
