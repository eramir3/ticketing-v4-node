name: ticketing-v4-nodejs
services:
  nats:
    image: nats:2.10-alpine
    container_name: ticketing-v4-nats-js
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  nats-box:
    image: natsio/nats-box:0.19.2
    container_name: ticketing-v4-nats-box
    depends_on:
      nats:
        condition: service_started
    entrypoint: /bin/sh
    command: -c "while true; do sleep 3600; done"
    stdin_open: true
    tty: true
    profiles:
      - tools

  alloy:
    image: grafana/alloy:latest
    container_name: ticketing-v4-alloy
    command: ["run", "/etc/alloy/config.alloy", "--server.http.listen-addr=0.0.0.0:12345"]
    depends_on:
      tempo:
        condition: service_started
      loki:
        condition: service_started
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "4317:4317"
      - "4318:4318"
      - "12345:12345"

  tempo:
    image: grafana/tempo:2.9.0
    container_name: ticketing-v4-tempo
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./observability/tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"

  loki:
    image: grafana/loki:latest
    container_name: ticketing-v4-loki
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./observability/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  prometheus:
    image: prom/prometheus:latest
    container_name: ticketing-v4-prometheus
    depends_on:
      alloy:
        condition: service_started
      blackbox-exporter:
        condition: service_started
      tempo:
        condition: service_started
      loki:
        condition: service_started
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  blackbox-exporter:
    image: quay.io/prometheus/blackbox-exporter:v0.28.0
    container_name: ticketing-v4-blackbox-exporter
    command:
      - "--config.file=/etc/blackbox/blackbox.yml"
    volumes:
      - ./observability/blackbox/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    ports:
      - "9115:9115"

  grafana:
    image: grafana/grafana:latest
    container_name: ticketing-v4-grafana
    depends_on:
      loki:
        condition: service_started
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_METRICS_ENABLED: "true"
    volumes:
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3006:3000"

  client-gateway:
    build:
      context: .
      dockerfile: apps/client-gateway/Dockerfile.dev
    image: ticketing-v4-client-gateway-js
    container_name: ticketing-v4-client-gateway-js
    depends_on:
      nats:
        condition: service_started
      alloy:
        condition: service_started
      auth:
        condition: service_started
      orders:
        condition: service_started
      payments:
        condition: service_started
      tickets:
        condition: service_started
    env_file:
      - ./apps/client-gateway/.env
    environment:
      AUTH_SERVICE: http://auth:3001/api
      ORDERS_SERVICE: http://orders:3003/api
      PAYMENTS_SERVICE: http://payments:3005/api
      TICKETS_SERVICE: http://tickets:3002/api
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://alloy:4318/v1/traces
    command: sh -c "cd /app && npm exec -- nx run-many -t build -p common,errors && npm exec -- nx daemon --start && npm exec -- nx serve client-gateway"
    volumes:
      - .:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "3000:3000"

  auth:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile.dev
    image: ticketing-v4-auth-js
    container_name: ticketing-v4-auth-js
    depends_on:
      nats:
        condition: service_started
      alloy:
        condition: service_started
      auth-mongo:
        condition: service_healthy
    env_file:
      - ./apps/auth/.env
    environment:
      MONGO_URI: mongodb://auth-mongo:27017/auth
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://alloy:4318/v1/traces
    command: sh -c "cd /app && npm exec -- nx run-many -t build -p common,errors && npm exec -- nx daemon --start && npm exec -- nx serve auth"
    volumes:
      - .:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "3001:3001"

  tickets:
    build:
      context: .
      dockerfile: apps/tickets/Dockerfile.dev
    image: ticketing-v4-tickets-js
    container_name: ticketing-v4-tickets-js
    depends_on:
      nats:
        condition: service_started
      alloy:
        condition: service_started
      tickets-mongo:
        condition: service_healthy
    env_file:
      - ./apps/tickets/.env
    environment:
      MONGO_URI: mongodb://tickets-mongo:27017/tickets
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://alloy:4318/v1/traces
    command: sh -c "cd /app && npm exec -- nx run-many -t build -p common,errors && npm exec -- nx daemon --start && npm exec -- nx serve tickets"
    volumes:
      - .:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "3002:3002"

  orders:
    build:
      context: .
      dockerfile: apps/orders/Dockerfile.dev
    image: ticketing-v4-orders-js
    container_name: ticketing-v4-orders-js
    depends_on:
      nats:
        condition: service_started
      alloy:
        condition: service_started
      orders-mongo:
        condition: service_healthy
    env_file:
      - ./apps/orders/.env
    environment:
      MONGO_URI: mongodb://orders-mongo:27017/orders
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://alloy:4318/v1/traces
    command: sh -c "cd /app && npm exec -- nx run-many -t build -p common,errors && npm exec -- nx daemon --start && npm exec -- nx serve orders"
    volumes:
      - .:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "3003:3003"

  expiration:
    build:
      context: .
      dockerfile: apps/expiration/Dockerfile.dev
    image: ticketing-v4-expiration-js
    container_name: ticketing-v4-expiration-js
    depends_on:
      nats:
        condition: service_started
      alloy:
        condition: service_started
      redis:
        condition: service_started
    env_file:
      - ./apps/expiration/.env
    environment:
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://alloy:4318/v1/traces
    command: sh -c "cd /app && npm exec -- nx run-many -t build -p common,errors && npm exec -- nx daemon --start && npm exec -- nx serve expiration"
    volumes:
      - .:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "3004:3004"

  payments:
    build:
      context: .
      dockerfile: apps/payments/Dockerfile.dev
    image: ticketing-v4-payments-js
    container_name: ticketing-v4-payments-js
    depends_on:
      nats:
        condition: service_started
      alloy:
        condition: service_started
      payments-mongo:
        condition: service_healthy
    env_file:
      - ./apps/payments/.env
    environment:
      MONGO_URI: mongodb://payments-mongo:27017/payments
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://alloy:4318/v1/traces
    command: sh -c "cd /app && npm exec -- nx run-many -t build -p common,errors && npm exec -- nx daemon --start && npm exec -- nx serve payments"
    volumes:
      - .:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3005/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "3005:3005"

  redis:
    image: redis:7.4-alpine
    container_name: ticketing-v4-redis-js
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  auth-mongo:
    image: mongo:7.0
    container_name: ticketing-v4-auth-mongo-js
    environment:
      MONGO_INITDB_DATABASE: auth
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    ports:
      - "27017:27017"
    volumes:
      - auth-mongo-data:/data/db

  tickets-mongo:
    image: mongo:7.0
    container_name: ticketing-v4-tickets-mongo-js
    environment:
      MONGO_INITDB_DATABASE: tickets
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - tickets-mongo-data:/data/db

  orders-mongo:
    image: mongo:7.0
    container_name: ticketing-v4-orders-mongo-js
    environment:
      MONGO_INITDB_DATABASE: orders
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - orders-mongo-data:/data/db

  payments-mongo:
    image: mongo:7.0
    container_name: ticketing-v4-payments-mongo-js
    environment:
      MONGO_INITDB_DATABASE: payments
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - payments-mongo-data:/data/db

volumes:
  auth-mongo-data:
  grafana-data:
  loki-data:
  orders-mongo-data:
  payments-mongo-data:
  prometheus-data:
  redis-data:
  tempo-data:
  tickets-mongo-data:
