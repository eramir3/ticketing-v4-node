global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: alloy
    static_configs:
      - targets:
          - alloy:12345

  - job_name: tempo
    metrics_path: /metrics
    static_configs:
      - targets:
          - tempo:3200

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets:
          - loki:3100

  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets:
          - grafana:3000

  - job_name: ticketing-apps
    metrics_path: /metrics
    static_configs:
      - targets:
          - client-gateway:3000
          - auth:3001
          - tickets:3002
          - orders:3003
          - expiration:3004
          - payments:3005
